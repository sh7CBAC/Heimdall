    <script>
    // HEIMDALL_JSON_CONFIG_CARD_SAFE_V5
    (function () {
      if (window.__HEIMDALL_JSON_CONFIG_CARD_SAFE_V5__) return;
      window.__HEIMDALL_JSON_CONFIG_CARD_SAFE_V5__ = true;

      var infoCache = null;
      var cardInserted = false;
      var infoRequested = false;

      function currentSubId() {
        var parts = window.location.pathname.split("/").filter(Boolean);
        return parts.length ? parts[parts.length - 1] : "";
      }

      function infoUrl() {
        var path = window.location.pathname.replace(/\/+$/, "");
        if (!path) return "/info";
        if (path.endsWith("/info")) return path;
        return path + "/info";
      }

      function normalizeJsonUrl(url) {
        var sid = currentSubId();
        if (!url && sid) return "/json/" + encodeURIComponent(sid);

        try {
          var parsed = new URL(String(url || ""), window.location.origin);
          if ((parsed.hostname === "localhost" || parsed.hostname === "127.0.0.1") && window.location.hostname !== parsed.hostname) {
            parsed.protocol = window.location.protocol;
            parsed.host = window.location.host;
          }
          return parsed.toString();
        } catch (e) {
          return sid ? "/json/" + encodeURIComponent(sid) : String(url || "");
        }
      }

      function jsonUrlFromInfo() {
        return normalizeJsonUrl(infoCache && infoCache.subJsonUrl ? infoCache.subJsonUrl : "");
      }

      function copyText(value) {
        value = value || "";
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(value);
        }

        var area = document.createElement("textarea");
        area.value = value;
        area.setAttribute("readonly", "readonly");
        area.style.position = "fixed";
        area.style.left = "-9999px";
        area.style.top = "0";
        document.body.appendChild(area);
        area.select();

        try { document.execCommand("copy"); } catch (e) {}
        document.body.removeChild(area);
        return Promise.resolve();
      }

      function isFa() {
        return (document.body && document.body.innerText || "").indexOf("فارسی") !== -1;
      }

      function allElements() {
        return Array.prototype.slice.call(document.querySelectorAll("body *"));
      }

      function smallestTextElement(words) {
        var found = allElements().filter(function (el) {
          var text = (el.textContent || "").trim();
          return words.some(function (word) { return text.indexOf(word) !== -1; });
        });

        found.sort(function (a, b) {
          return (a.textContent || "").length - (b.textContent || "").length;
        });

        return found[0] || null;
      }

      function roundedCardFor(el) {
        var cur = el;
        for (var i = 0; i < 12 && cur && cur !== document.body; i += 1, cur = cur.parentElement) {
          var r = cur.getBoundingClientRect();
          var cs = window.getComputedStyle(cur);
          if (r.width > 260 && r.height > 45 && cs.borderRadius && cs.borderRadius !== "0px") return cur;
        }
        return null;
      }

      function osCard() {
        var el = smallestTextElement(["انتخاب سیستم عامل", "Operating System", "Select OS"]);
        return el ? roundedCardFor(el) : null;
      }

      function requestInfo() {
        if (infoRequested) return;
        infoRequested = true;

        fetch(infoUrl(), { cache: "no-store" })
          .then(function (response) { return response.ok ? response.json() : null; })
          .then(function (data) {
            infoCache = data || {};
            updateCardFromInfo();
          })
          .catch(function () {});
      }

      function updateCardFromInfo() {
        var labelEl = document.querySelector("[data-heimdall-safe-json-label]");
        if (!labelEl) return;
        var label = infoCache && infoCache.subJsonLabel ? infoCache.subJsonLabel : currentSubId() || "JSON Config";
        labelEl.textContent = label;
      }

      function setCollapsed(card, collapsed) {
        var body = card.querySelector("[data-heimdall-safe-json-body]");
        var toggle = card.querySelector("[data-heimdall-safe-json-toggle]");
        if (!body || !toggle) return;

        card.setAttribute("data-heimdall-safe-json-collapsed", collapsed ? "1" : "0");
        body.style.display = collapsed ? "none" : "block";
        toggle.textContent = collapsed ? "▼" : "▲";
      }

      function createCardFast() {
        if (cardInserted || document.querySelector("[data-heimdall-safe-json-config-card]")) {
          cardInserted = true;
          return true;
        }

        var anchor = osCard();
        if (!anchor || !anchor.parentElement) return false;

        var fa = isFa();
        var title = fa ? "کانفیگ JSON" : "JSON Config";
        var copyTextLabel = fa ? "کپی" : "Copy";
        var loadingLabel = fa ? "در حال آماده‌سازی" : "Preparing";
        var copiedLabel = fa ? "کپی شد" : "Copied";
        var failedLabel = fa ? "خطا" : "Error";
        var label = currentSubId() || "JSON Config";

        var card = document.createElement("div");
        card.setAttribute("data-heimdall-safe-json-config-card", "1");
        card.setAttribute("data-heimdall-safe-json-collapsed", "1");
        card.style.cssText =
          "width:100%;box-sizing:border-box;margin:1rem auto 0 auto;border-radius:20px;" +
          "background:rgba(255,255,255,.95);box-shadow:0 0 30px 10px rgba(0,0,0,.08);" +
          "padding:0;color:#111;direction:rtl;overflow:hidden;";

        var header = document.createElement("button");
        header.type = "button";
        header.setAttribute("data-heimdall-safe-json-header", "1");
        header.style.cssText =
          "width:100%;min-height:76px;display:grid;grid-template-columns:2.75rem 1fr 2.75rem;align-items:center;gap:.75rem;" +
          "border:0;background:transparent;padding:0 1.25rem;margin:0;cursor:pointer;color:inherit;font:inherit;direction:ltr;box-sizing:border-box;";

        var toggle = document.createElement("div");
        toggle.setAttribute("data-heimdall-safe-json-toggle", "1");
        toggle.textContent = "▼";
        toggle.style.cssText =
          "grid-column:1;justify-self:start;text-align:left;font-size:1rem;font-weight:900;color:#50527c;line-height:1;";

        var titleEl = document.createElement("div");
        titleEl.textContent = title;
        titleEl.style.cssText =
          "grid-column:2;text-align:center;font-size:1.08rem;font-weight:800;direction:rtl;";

        var icon = document.createElement("div");
        icon.textContent = "{ }";
        icon.style.cssText =
          "grid-column:3;justify-self:end;text-align:right;font-size:1.55rem;font-weight:900;color:#50527c;direction:ltr;line-height:1;";

        header.appendChild(toggle);
        header.appendChild(titleEl);
        header.appendChild(icon);

        var body = document.createElement("div");
        body.setAttribute("data-heimdall-safe-json-body", "1");
        body.style.cssText = "padding:0 1rem 1rem 1rem;display:none;";

        var row = document.createElement("div");
        row.style.cssText =
          "display:flex;align-items:center;justify-content:space-between;gap:.75rem;" +
          "border:1px solid rgba(80,80,120,.25);border-radius:14px;padding:.75rem 1rem;" +
          "background:rgba(255,255,255,.55);direction:ltr;";

        var name = document.createElement("div");
        name.textContent = label;
        name.setAttribute("data-heimdall-safe-json-label", "1");
        name.style.cssText =
          "font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left;direction:ltr;";

        var button = document.createElement("button");
        button.type = "button";
        button.textContent = copyTextLabel;
        button.setAttribute("data-heimdall-safe-json-copy", "1");
        button.style.cssText =
          "border:0;background:#50527c;color:#fff;border-radius:12px;padding:.45rem .9rem;" +
          "cursor:pointer;font-weight:800;min-width:72px;";

        button.addEventListener("click", function (event) {
          event.stopPropagation();

          var original = button.textContent;
          button.textContent = loadingLabel;

          var infoPromise = infoCache ? Promise.resolve(infoCache) :
            fetch(infoUrl(), { cache: "no-store" })
              .then(function (response) { return response.ok ? response.json() : {}; })
              .then(function (data) {
                infoCache = data || {};
                updateCardFromInfo();
                return infoCache;
              });

          infoPromise
            .then(function () {
              return fetch(jsonUrlFromInfo(), { cache: "no-store" });
            })
            .then(function (response) {
              if (!response.ok) throw new Error("JSON fetch failed");
              return response.text();
            })
            .then(function (jsonText) { return copyText(jsonText); })
            .then(function () {
              button.textContent = copiedLabel;
              setTimeout(function () { button.textContent = original; }, 1400);
            })
            .catch(function () {
              button.textContent = failedLabel;
              setTimeout(function () { button.textContent = original; }, 1600);
            });
        });

        row.appendChild(name);
        row.appendChild(button);
        body.appendChild(row);
        card.appendChild(header);
        card.appendChild(body);

        header.addEventListener("click", function () {
          setCollapsed(card, card.getAttribute("data-heimdall-safe-json-collapsed") !== "1" ? true : false);
        });

        anchor.parentElement.insertBefore(card, anchor.nextSibling);
        cardInserted = true;

        requestInfo();
        return true;
      }

      function boot() {
        var tries = 0;
        var timer = setInterval(function () {
          tries += 1;
          if (createCardFast() || tries > 30) clearInterval(timer);
        }, 120);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", boot, { once: true });
      } else {
        boot();
      }
    })();

          box.style.cssText =
            "border:1px solid rgba(80,80,120,.16);border-radius:14px;padding:.7rem .5rem;" +
            "background:rgba(255,255,255,.45);text-align:center;";

          var l = document.createElement("div");
          l.textContent = label;
          l.style.cssText = "font-size:.82rem;color:#777;font-weight:700;margin-bottom:.35rem;";

          var v = document.createElement("div");
          v.textContent = value;
          v.style.cssText = "font-size:1rem;color:#207a34;font-weight:900;direction:ltr;";

          box.appendChild(l);
          box.appendChild(v);
          return box;
        }

        grid.appendChild(metric(fa ? "دانلود" : "Download", downloadText));
        grid.appendChild(metric(fa ? "آپلود" : "Upload", uploadText));

        card.appendChild(title);
        card.appendChild(grid);

        anchor.parentElement.insertBefore(card, anchor.nextSibling);
        inserted = true;
        return true;
      }

      function boot() {
        fetch(infoUrl(), { cache: "no-store" })
          .then(function (response) { return response.ok ? response.json() : null; })
          .then(function (info) {
            var tries = 0;
            var timer = setInterval(function () {
              tries += 1;
              if (createSpeedCard(info) || tries > 30) clearInterval(timer);
            }, 120);
          })
          .catch(function () {});
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", boot, { once: true });
      } else {
        boot();
      }
    })();
    </script>
  
  </body>
</html>
