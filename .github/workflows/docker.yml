name: Heimdall Container Publishing Disabled

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  policy:
    name: Container publishing policy
    runs-on: ubuntu-latest

    steps:
      - name: Report disabled container publication
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Automatic Heimdall container publishing is disabled."
          echo "Container images must not substitute an official prebuilt core."
          echo "The v1.5.0 stable distribution is linux-amd64 archive only."
